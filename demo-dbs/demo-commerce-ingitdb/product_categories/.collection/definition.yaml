titles:
  en: Product Categories

record_file:
  name: "{key}.yaml"
  type: "map[string]any"
  format: yaml

columns:
  id:
    type: string
    required: true
    max_length: 64
  name:
    type: string
    required: true
    min_length: 2
    max_length: 100
  parent_category_id:
    type: string
    required: false
    foreign_key: product_categories
  description:
    type: string
    required: false
    max_length: 500
  sort_order:
    type: int
    required: false
    # TODO: min value constraint needs implementation in ColumnDef
    # min: 0
  is_active:
    type: bool
    required: true

columns_order:
  - id
  - name
  - parent_category_id
  - description
  - sort_order
  - is_active
