titles:
  en: Promotions

record_file:
  name: "{key}.yaml"
  type: "map[string]any"
  format: yaml

columns:
  id:
    type: string
    required: true
    max_length: 64
  code:
    type: string
    required: true
    min_length: 3
    max_length: 32
    # TODO: regex constraint needs implementation in ColumnDef
    # regex: "^[A-Z0-9_\\-]+$"
  description:
    type: string
    required: false
    max_length: 500
  discount_type:
    type: string
    required: true
    # TODO: enum constraint needs implementation in ColumnDef
    # enum: [percent, fixed]
  discount_value:
    type: float
    required: true
    # TODO: min value constraint needs implementation in ColumnDef
    # min: 0
  currency_id:
    type: string
    required: false
    foreign_key: currencies
    # TODO: conditional required (required when discount_type=fixed) needs implementation
  min_order_amount:
    type: float
    required: false
    # TODO: min value constraint needs implementation in ColumnDef
    # min: 0
  valid_from:
    type: date
    required: true
  valid_until:
    type: date
    required: false
  max_uses:
    type: int
    required: false
    # TODO: min value constraint needs implementation in ColumnDef
    # min: 1
  uses_count:
    type: int
    required: true
    # TODO: min value constraint needs implementation in ColumnDef
    # min: 0
  is_active:
    type: bool
    required: true

columns_order:
  - id
  - code
  - description
  - discount_type
  - discount_value
  - currency_id
  - min_order_amount
  - valid_from
  - valid_until
  - max_uses
  - uses_count
  - is_active
