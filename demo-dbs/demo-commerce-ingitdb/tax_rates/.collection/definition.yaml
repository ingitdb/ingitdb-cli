titles:
  en: Tax Rates

record_file:
  name: "{key}.yaml"
  type: "map[string]any"
  format: yaml

columns:
  id:
    type: string
    required: true
    max_length: 64
  country_id:
    type: string
    required: true
    foreign_key: countries
  region:
    type: string
    required: false
    max_length: 100
  label:
    type: string
    required: true
    max_length: 50
  rate_percent:
    type: float
    required: true
    # TODO: min/max value constraints need implementation in ColumnDef
    # min: 0
    # max: 100
  effective_date:
    type: date
    required: true
  is_active:
    type: bool
    required: true

columns_order:
  - id
  - country_id
  - region
  - label
  - rate_percent
  - effective_date
  - is_active
