titles:
  en: Products

record_file:
  name: "{key}.yaml"
  type: "map[string]any"
  format: yaml

columns:
  id:
    type: string
    required: true
    max_length: 64
  sku:
    type: string
    required: true
    min_length: 3
    max_length: 64
    # TODO: regex constraint needs implementation in ColumnDef
    # regex: "^[A-Z0-9\\-]+$"
  name:
    type: string
    required: true
    min_length: 2
    max_length: 200
  description:
    type: string
    required: false
    max_length: 2000
  category_id:
    type: string
    required: true
    foreign_key: product_categories
  supplier_id:
    type: string
    required: true
    foreign_key: suppliers
  image_id:
    type: string
    required: false
    foreign_key: product_images
  unit_price:
    type: float
    required: true
    # TODO: min value constraint needs implementation in ColumnDef
    # min: 0.01
  currency_id:
    type: string
    required: true
    foreign_key: currencies
  weight_kg:
    type: float
    required: false
    # TODO: min value constraint needs implementation in ColumnDef
    # min: 0
  stock_quantity:
    type: int
    required: true
    # TODO: min value constraint needs implementation in ColumnDef
    # min: 0
  is_active:
    type: bool
    required: true

columns_order:
  - id
  - sku
  - name
  - description
  - category_id
  - supplier_id
  - image_id
  - unit_price
  - currency_id
  - weight_kg
  - stock_quantity
  - is_active
