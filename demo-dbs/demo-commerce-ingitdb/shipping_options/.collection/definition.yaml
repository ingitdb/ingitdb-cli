titles:
  en: Shipping Options

record_file:
  name: "{key}.yaml"
  type: "map[string]any"
  format: yaml

columns:
  id:
    type: string
    required: true
    max_length: 64
  shipper_id:
    type: string
    required: true
    foreign_key: shippers
  name:
    type: string
    required: true
    min_length: 2
    max_length: 100
  service_level:
    type: string
    required: true
    # TODO: enum constraint needs implementation in ColumnDef
    # enum: [economy, standard, express, overnight]
  base_price:
    type: float
    required: true
    # TODO: min value constraint needs implementation in ColumnDef
    # min: 0
  currency_id:
    type: string
    required: true
    foreign_key: currencies
  estimated_days_min:
    type: int
    required: true
    # TODO: min value constraint needs implementation in ColumnDef
    # min: 0
  estimated_days_max:
    type: int
    required: true
    # TODO: min value constraint needs implementation in ColumnDef
    # min: 0
  is_active:
    type: bool
    required: true

columns_order:
  - id
  - shipper_id
  - name
  - service_level
  - base_price
  - currency_id
  - estimated_days_min
  - estimated_days_max
  - is_active
