titles:
  en: Currencies

record_file:
  name: "{key}.yaml"
  type: "map[string]any"
  format: yaml

columns:
  id:
    type: string
    required: true
    min_length: 3
    max_length: 3
    # TODO: regex constraint needs implementation in ColumnDef
    # regex: "^[A-Z]{3}$"
  name:
    type: string
    required: true
    min_length: 2
    max_length: 64
  symbol:
    type: string
    required: true
    min_length: 1
    max_length: 8
  decimal_places:
    type: int
    required: true
    # TODO: min/max value constraints need implementation in ColumnDef
    # min: 0
    # max: 4
  is_active:
    type: bool
    required: true

columns_order:
  - id
  - name
  - symbol
  - decimal_places
  - is_active
