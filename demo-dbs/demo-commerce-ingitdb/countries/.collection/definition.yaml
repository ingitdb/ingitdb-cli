titles:
  en: Countries

record_file:
  name: "{key}.yaml"
  type: "map[string]any"
  format: yaml

columns:
  id:
    type: string
    required: true
    min_length: 2
    max_length: 2
    # TODO: regex constraint needs implementation in ColumnDef
    # regex: "^[A-Z]{2}$"
  name:
    type: string
    required: true
    min_length: 2
    max_length: 100
  currency_id:
    type: string
    required: true
    foreign_key: currencies
  phone_prefix:
    type: string
    required: true
    # TODO: regex constraint needs implementation in ColumnDef
    # regex: "^\\+\\d{1,4}$"
  region:
    type: string
    required: false
    # TODO: enum constraint needs implementation in ColumnDef
    # enum: [Africa, Americas, Asia, Europe, Oceania]

columns_order:
  - id
  - name
  - currency_id
  - phone_prefix
  - region
