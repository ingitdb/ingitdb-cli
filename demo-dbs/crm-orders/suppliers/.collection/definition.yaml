titles:
  en: Suppliers

record_file:
  name: "{key}.yaml"
  type: "map[string]any"
  format: yaml

columns:
  id:
    type: string
    required: true
    max_length: 64
  name:
    type: string
    required: true
    min_length: 2
    max_length: 200
  contact_name:
    type: string
    required: false
    max_length: 100
  email:
    type: string
    required: true
    max_length: 254
    # TODO: regex constraint needs implementation in ColumnDef
    # regex: "^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
  phone:
    type: string
    required: false
    # TODO: regex constraint needs implementation in ColumnDef
    # regex: "^\\+\\d{7,15}$"
  country_id:
    type: string
    required: true
    foreign_key: countries
  website:
    type: string
    required: false
    max_length: 512
    # TODO: regex constraint needs implementation in ColumnDef
    # regex: "^https?://"
  is_active:
    type: bool
    required: true

columns_order:
  - id
  - name
  - contact_name
  - email
  - phone
  - country_id
  - website
  - is_active
