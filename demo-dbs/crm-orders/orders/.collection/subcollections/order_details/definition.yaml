titles:
  en: Order Details

record_file:
  name: "details.json"
  type: "[]map[string]any"
  format: json

columns:
  id:
    type: string
    required: true
    max_length: 64
  product_id:
    type: string
    required: true
    foreign_key: products
  quantity:
    type: int
    required: true
    # TODO: min value constraint needs implementation in ColumnDef
    # min: 1
  unit_price:
    type: float
    required: true
    # TODO: min value constraint needs implementation in ColumnDef
    # min: 0
  currency_id:
    type: string
    required: true
    foreign_key: currencies
  discount_percent:
    type: float
    required: false
    # TODO: min/max value constraints need implementation in ColumnDef
    # min: 0
    # max: 100
  line_total:
    type: float
    required: true
    # TODO: min value constraint needs implementation in ColumnDef
    # min: 0

columns_order:
  - id
  - product_id
  - quantity
  - unit_price
  - currency_id
  - discount_percent
  - line_total
