version: "2"

run:
  timeout: 3m

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  exclusions:
    rules:
      # staticcheck SA5011 over-flags the idiomatic test pattern
      # `if x == nil { t.Fatal(...) }; … x.Field …` — t.Fatal terminates, so it
      # is not a real nil dereference. Keep SA5011 active for production code.
      - path: _test\.go
        linters:
          - staticcheck
        text: SA5011
