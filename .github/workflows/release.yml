name: Release

# Release is triggered by pushing a vX.Y.Z tag. The tag fixes the version
# (ingitdb is past v1, so we never want an automatic major bump from a `feat!:`
# commit) — pushing the tag IS the explicit, human-gated release action:
#
#   git tag v1.32.0 && git push origin v1.32.0
#
# Job graph:
#   core       — strongo/cicd shared workflow: builds every OS + archives +
#                GitHub release + AUR + Homebrew + Scoop + WinGet (one ubuntu job).
#   chocolatey — Windows-only (needs `choco`); pushes the .nupkg.
#   snap       — needs `snapcraft`; isolated so a Snap Store issue can't fail the
#                GitHub release or the other publishers.
#
# The core job's GoReleaser uploads the release (all binaries, incl. the
# unsigned macOS ones) BEFORE running its publishers, so a publisher failure
# never blocks the binaries from shipping — which is why the old dedicated
# build-macos job is no longer needed.

on:
  push:
    tags:
      - 'v*'

# One release at a time; a second tag push queues instead of racing the first.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # Build every OS + publish everything that runs safely on one ubuntu job.
  core:
    name: Build + release (AUR, Homebrew, Scoop, WinGet)
    uses: strongo/cicd/.github/workflows/release.yml@v1
    permissions:
      contents: write
    with:
      go_version: '1.26.5'
    secrets:
      # Cross-repo PAT for the Homebrew tap + Scoop bucket (the default
      # GITHUB_TOKEN can't push to those repos).
      GORELEASER_GITHUB_TOKEN: ${{ secrets.INGITDB_GORELEASER_GITHUB_TOKEN }}
      # Separate classic PAT for the WinGet cross-fork PR to microsoft/winget-pkgs.
      WINGET_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
      # AUR SSH deploy key (key contents; GoReleaser accepts them directly).
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

  # Chocolatey needs the `choco` CLI, which exists only on Windows runners, so
  # it cannot converge into the shared ubuntu job. It packages the same Windows
  # zip the core job uploaded and pushes the .nupkg to chocolatey.org.
  chocolatey:
    name: Publish Chocolatey (Windows)
    needs: core
    if: ${{ !failure() && !cancelled() }}
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Enable Git long paths
        run: git config --system core.longpaths true

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags --force

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: v2
          args: release --clean --config .github/goreleaser-chocolatey.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.INGITDB_GORELEASER_GITHUB_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}

  # Snapcraft needs `snapcraft` installed and is kept isolated so a Snap Store
  # outage / review hold fails only this job.
  snap:
    name: Publish Snapcraft
    needs: core
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags --force

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'

      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: v2
          args: release --clean --config .github/goreleaser-snap.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.INGITDB_GORELEASER_GITHUB_TOKEN }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
