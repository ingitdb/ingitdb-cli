name: Release

on:
  workflow_dispatch: # Allows manual trigger from Actions tab.
    inputs:
      tag:
        description: "Tag to release (e.g. v1.31.0). Empty = newest tag on the default branch."
        required: false
        type: string

# One release at a time; a second dispatch queues instead of racing the first.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-linux:
    name: Build Linux, AUR, Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags --force

      # Resolve the release tag ONCE and check it out, so goreleaser's
      # git-state check (tag must point at HEAD) cannot race a tag pushed
      # around dispatch time, and all jobs release the same tag even if a
      # newer one lands mid-run.
      - name: Resolve and check out release tag
        id: tag
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="$(git describe --tags --abbrev=0)"
          fi
          echo "Releasing tag: $TAG"
          git checkout --quiet "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - name: Setup SSH key for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          echo "AUR_SSH_PRIVATE_KEY=$HOME/.ssh/aur_key" >> $GITHUB_ENV

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: v2
          args: release --clean --config .github/goreleaser-linux.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.INGITDB_GORELEASER_GITHUB_TOKEN }}

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: goreleaser-dist
          path: dist/
          retention-days: 1

  build-windows:
    name: Build Windows, WinGet, Scoop, Chocolatey
    needs:
      - build-linux
    if: "!failure() && !cancelled()"
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Enable Git long paths
        run: git config --system core.longpaths true

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Check out release tag
        shell: bash
        run: git checkout --quiet "${{ needs.build-linux.outputs.tag }}"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: v2
          args: release --clean --config .github/goreleaser-windows.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.INGITDB_GORELEASER_GITHUB_TOKEN }}
          WINGET_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          INGITDB_GORELEASER_GITHUB_TOKEN: ${{ secrets.INGITDB_GORELEASER_GITHUB_TOKEN }}

  # See docs/release/homebrew.md for setup instructions
  publish-homebrew:
    name: Publish to Homebrew
    needs:
      - build-linux
    if: "!failure() && !cancelled()"
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Check out release tag
        shell: bash
        run: git checkout --quiet "${{ needs.build-linux.outputs.tag }}"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: v2
          args: release --clean --config .github/goreleaser-homebrew.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.INGITDB_GORELEASER_GITHUB_TOKEN }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          NOTARIZE_ISSUER_ID: ${{ secrets.NOTARIZE_ISSUER_ID }}
          NOTARIZE_KEY_ID: ${{ secrets.NOTARIZE_KEY_ID }}
          NOTARIZE_KEY: ${{ secrets.NOTARIZE_KEY }}

  # See docs/release/snapcraft.md for setup instructions
  publish-snap:
    name: Publish to Snapcraft
    needs:
      - build-linux
    if: "!failure() && !cancelled()"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Check out release tag
        shell: bash
        run: git checkout --quiet "${{ needs.build-linux.outputs.tag }}"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: v2
          args: release --clean --config .github/goreleaser-publish-snap.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.INGITDB_GORELEASER_GITHUB_TOKEN }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
