name: inGitDB

on:
  push:
    branches-ignore:
      - renovate/**
  pull_request:
    branches:
      - '**'

jobs:

  Validator:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build ingitdb executable
        run: go build -o ingitdb ./cmd/ingitdb

      - run: chmod +x ingitdb

      - name: inGitDB CI
        run: ./ingitdb ci

      - name: Commit materialized views
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update materialized views [skip ci]"

      - name: Push materialized views
        run: git push
        if: github.event_name == 'push'
