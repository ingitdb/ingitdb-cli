# Chocolatey publisher — runs in its OWN Windows job (see release.yml).
#
# Chocolatey cannot converge into the shared ubuntu release job: GoReleaser's
# chocolatey pipe shells out to the `choco` CLI, which exists only on Windows
# runners ("GoReleaser will not install chocolatey/choco for you").
#
# The shared core job (.goreleaser.yaml) already builds + uploads the Windows
# zip and owns the GitHub release; this config only builds the artifact locally
# (so `choco pack` has something to package) and pushes the .nupkg to
# chocolatey.org. `release.disable: true` keeps it from touching the GitHub
# release the core job created.
version: 2

project_name: ingitdb

before:
  hooks:
    - go mod tidy

builds:
  - id: ingitdb-windows
    main: ./cmd/ingitdb
    binary: ingitdb
    env: [CGO_ENABLED=0]
    goos: [windows]
    goarch: [amd64]
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: zip
    formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    ids: [ingitdb-windows]

checksum:
  name_template: checksums-chocolatey.txt

release:
  github:
    owner: ingitdb
    name: ingitdb-cli
  # The shared core job owns the GitHub release + assets. This job only pushes
  # the Chocolatey package (whose install script downloads the core-uploaded zip
  # via url_template), so it must not create or upload to the release.
  disable: true

chocolateys:
  - name: ingitdb
    ids:
      - zip
    title: inGitDB - Git-based Database
    authors: inGitDB Contributors
    owners: inGitDB
    project_url: https://ingitdb.com/
    project_source_url: https://github.com/ingitdb/ingitdb-cli
    package_source_url: https://github.com/ingitdb/ingitdb-cli
    docs_url: https://ingitdb.com/en/docs/
    bug_tracker_url: https://github.com/ingitdb/ingitdb-cli/issues
    tags: database git schema-validation cli developer-tools yaml json ai-native
    license_url: https://github.com/ingitdb/ingitdb-cli/blob/main/LICENSE
    icon_url: https://ingitdb.com/ingitdb-logo.png
    release_notes: "https://github.com/ingitdb/ingitdb-cli/releases/tag/{{ .Tag }}"
    summary: "A CLI for a schema-validated, AI-native database backed by a Git repository."
    url_template: "https://github.com/ingitdb/ingitdb-cli/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    description: |
      ingitdb is a developer-grade, schema-validated, AI-native database
      whose storage engine is a Git repository. Records are YAML/JSON files,
      collections and schemas are defined declaratively.
    api_key: "{{ .Env.CHOCOLATEY_API_KEY }}"
